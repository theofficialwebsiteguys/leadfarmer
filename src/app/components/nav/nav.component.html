<nav class="nav" [class.scrolled]="scrolled" [class.menu-open]="menuOpen" role="navigation" aria-label="Main navigation">

  <!-- Fades out once scrolled (nav goes solid white); keeps the logo/links
       legible over whatever frame of the hero video is playing behind it -->
  <div class="nav__scrim" aria-hidden="true"></div>

  <a routerLink="/" class="nav__logo-link" aria-label="Lead Farmer — home">
    <img
      src="assets/brand/brand-head.png"
      alt="Lead Farmer"
      class="nav__logo"
    >
  </a>

  <!-- Desktop links -->
  <ul class="nav__links" role="list">
    <li><a routerLink="/" fragment="about" class="nav__link">Story</a></li>
    <li>
      <a
        routerLink="/strains"
        routerLinkActive="nav__link--active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav__link"
      >Strains</a>
    </li>
    <li><a routerLink="/" fragment="photos" class="nav__link">Photos</a></li>
    <li><a routerLink="/" fragment="articles" class="nav__link">Articles</a></li>
    <li><a routerLink="/" fragment="contact" class="nav__link">Contact</a></li>
  </ul>

  <!-- Mobile hamburger -->
  <button
    class="nav__hamburger"
    type="button"
    [attr.aria-expanded]="menuOpen"
    aria-controls="nav-mobile-menu"
    aria-label="Toggle navigation menu"
    (click)="toggleMenu()"
  >
    <span class="nav__bar" aria-hidden="true"></span>
    <span class="nav__bar" aria-hidden="true"></span>
    <span class="nav__bar" aria-hidden="true"></span>
  </button>

  <!-- Mobile menu — full-screen takeover -->
  <div
    id="nav-mobile-menu"
    class="nav__mobile-menu"
    [class.open]="menuOpen"
    role="menu"
  >
    <a routerLink="/" fragment="about" class="nav__mobile-link" role="menuitem" (click)="closeMenu()">Story</a>
    <a
      routerLink="/strains"
      routerLinkActive="nav__mobile-link--active"
      [routerLinkActiveOptions]="{ exact: false }"
      class="nav__mobile-link"
      role="menuitem"
      (click)="closeMenu()"
    >Strains</a>
    <a routerLink="/" fragment="photos" class="nav__mobile-link" role="menuitem" (click)="closeMenu()">Photos</a>
    <a routerLink="/" fragment="articles" class="nav__mobile-link" role="menuitem" (click)="closeMenu()">Articles</a>
    <a routerLink="/" fragment="contact" class="nav__mobile-link" role="menuitem" (click)="closeMenu()">Contact</a>
  </div>

</nav>
