  <div id="strain-filters-panel" class="strain-filters__panel" [class.is-open]="mobileOpen">

    @if (classifications.length) {
      <div class="strain-filters__group">
        <p class="strain-filters__group-label">Type</p>
        <div class="strain-filters__chips" role="group" aria-label="Filter by strain type">
          <button
            type="button"
            class="strain-filters__chip"
            [class.is-active]="selectedTypes.length === 0"
            (click)="clearTypes()"
          >All Strains</button>

          @for (option of classifications; track option.value) {
            <button
              type="button"
              class="strain-filters__chip"
              [class.is-active]="selectedTypes.includes(option.value)"
              [attr.aria-pressed]="selectedTypes.includes(option.value)"
              (click)="toggleType(option.value)"
            >{{ option.value }} <span class="strain-filters__chip-count">{{ option.count }}</span></button>
          }
        </div>
      </div>
    }

    @if (formats.length) {
      <div class="strain-filters__group">
        <p class="strain-filters__group-label">Format</p>
        <div class="strain-filters__chips" role="group" aria-label="Filter by available format">
          @for (option of formats; track option.value) {
            <button
              type="button"
              class="strain-filters__chip"
              [class.is-active]="selectedFormats.includes(option.value)"
              [attr.aria-pressed]="selectedFormats.includes(option.value)"
              (click)="toggleFormat(option.value)"
            >{{ option.value }} <span class="strain-filters__chip-count">{{ option.count }}</span></button>
          }
        </div>
      </div>
    }

    @if (badges.length) {
      <div class="strain-filters__group">
        <p class="strain-filters__group-label">Collection</p>
        <div class="strain-filters__chips" role="group" aria-label="Filter by collection">
          @for (option of badges; track option.value) {
            <button
              type="button"
              class="strain-filters__chip"
              [class.is-active]="selectedBadges.includes(option.value)"
              [attr.aria-pressed]="selectedBadges.includes(option.value)"
              (click)="toggleBadge(option.value)"
            >{{ option.value }} <span class="strain-filters__chip-count">{{ option.count }}</span></button>
          }
        </div>
      </div>
    }

  </div>
</div>
