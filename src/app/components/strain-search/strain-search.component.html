<div class="strain-search">
  <svg class="strain-search__icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
    <circle cx="9" cy="9" r="6.25" stroke="currentColor" stroke-width="1.5" />
    <line x1="13.75" y1="13.75" x2="18" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
  </svg>

  <label class="visually-hidden" for="strain-search-input">Search strains by name</label>
  <input
    id="strain-search-input"
    type="search"
    class="strain-search__input"
    placeholder="Search strains…"
    autocomplete="off"
    [(ngModel)]="value"
    (ngModelChange)="valueChange.emit($event)"
  >

  @if (value) {
    <button type="button" class="strain-search__clear" (click)="clear()" aria-label="Clear search">&times;</button>
  }
</div>
